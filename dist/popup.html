<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitGest Settings</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 300px;
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }

    .header {
      background: #161b22;
      border-bottom: 1px solid #21262d;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #00d4ff, #00ff9d);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 14px;
      font-weight: 700;
    }

    .header-text p {
      font-size: 11px;
      color: #7d8590;
      margin-top: 1px;
    }

    .body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #7d8590;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .toggle-group {
      display: flex;
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 6px;
      overflow: hidden;
    }

    .toggle-group button {
      flex: 1;
      padding: 7px 12px;
      border: none;
      background: transparent;
      color: #7d8590;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .toggle-group button.active {
      background: #21262d;
      color: #e6edf3;
    }

    .toggle-group button:not(:last-child) {
      border-right: 1px solid #21262d;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 12px;
      font-family: "JetBrains Mono", monospace;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: #388bfd;
    }

    .pat-hint {
      font-size: 11px;
      color: #7d8590;
      margin-top: 5px;
      line-height: 1.5;
    }

    .pat-hint a {
      color: #388bfd;
      text-decoration: none;
    }

    .pat-hint a:hover {
      text-decoration: underline;
    }

    .quota-bar {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 12px;
    }

    .quota-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .quota-label {
      font-size: 12px;
      color: #7d8590;
    }

    .quota-count {
      font-size: 12px;
      font-weight: 600;
    }

    .quota-count.at-limit {
      color: #f85149;
    }

    .quota-count.near-limit {
      color: #d29922;
    }

    .quota-count.ok {
      color: #3fb950;
    }

    .quota-track {
      height: 4px;
      background: #21262d;
      border-radius: 2px;
      overflow: hidden;
    }

    .quota-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s;
    }

    .quota-fill.ok {
      background: #3fb950;
    }

    .quota-fill.near {
      background: #d29922;
    }

    .quota-fill.limit {
      background: #f85149;
      width: 0%;
    }

    .quota-pro-hint {
      font-size: 11px;
      color: #7d8590;
      margin-top: 8px;
      text-align: center;
    }

    .quota-pro-hint strong {
      color: #388bfd;
      cursor: pointer;
    }

    .save-btn {
      width: 100%;
      background: #238636;
      border: 1px solid #2ea043;
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .save-btn:hover {
      background: #2ea043;
    }

    .save-btn.saved {
      background: #1a7f37;
      border-color: #238636;
    }

    .footer {
      border-top: 1px solid #21262d;
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #484f58;
    }

    .footer a {
      color: #484f58;
      text-decoration: none;
    }

    .footer a:hover {
      color: #7d8590;
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="logo">🤖</div>
    <div class="header-text">
      <h1>GitGest</h1>
      <p>GitHub → AI Context · v1.0.0</p>
    </div>
  </div>

  <div class="body">
    <!-- Output Format -->
    <div class="field">
      <label>Output Format</label>
      <div class="toggle-group">
        <button id="fmt-markdown" class="active">Markdown</button>
        <button id="fmt-json">JSON</button>
      </div>
    </div>

    <!-- GitHub PAT -->
    <div class="field">
      <label>GitHub Token (Pro)</label>
      <input type="password" id="pat-input" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off" />
      <p class="pat-hint">
        Increases limit from 60 → 5,000 req/hr and enables private repos.
        <a href="https://github.com/settings/tokens/new?scopes=repo&description=GitGest" target="_blank"
          rel="noopener noreferrer">
          Generate token ↗
        </a>
      </p>
    </div>

    <!-- Daily Quota -->
    <div class="quota-bar" id="quota-section">
      <div class="quota-header">
        <span class="quota-label">Daily Exports (Free Tier)</span>
        <span class="quota-count ok" id="quota-count">0 / 5</span>
      </div>
      <div class="quota-track">
        <div class="quota-fill ok" id="quota-fill"></div>
      </div>
      <p class="quota-pro-hint" id="quota-pro-hint">
        Add a GitHub Token above for <strong>unlimited</strong> exports
      </p>
    </div>

    <!-- Save -->
    <button class="save-btn" id="save-btn">Save Settings</button>
  </div>

  <div class="footer">
    <a href="https://github.com/medissaoui711/Gitgest" target="_blank" rel="noopener noreferrer">GitHub ↗</a>
    <a href="https://github.com/medissaoui711/Gitgest/blob/master/PRIVACY.md" target="_blank"
      rel="noopener noreferrer">Privacy Policy</a>
    <span>v1.0.0</span>
  </div>

  <script src="popup.bundle.js"></script>
</body>

</html>
